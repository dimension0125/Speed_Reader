<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>반응형 독해 트레이너</title>
    <style>
        :root {
            /* 글자 크기 커스터마이징 (여기서 조절하세요) */
            --font-pc: 1.2rem;      /* PC: 기존 1.6에서 1.2로 축소 */
            --font-mobile: 1.05rem; /* 모바일: 기존 1.2에서 1.05로 축소 */
            --line-height: 1.8;     /* 줄간격: 약간 좁혀서 밀도 높임 */
            --primary-color: #007bff;
        }

        body { 
            font-family: 'Pretendard', -apple-system, sans-serif; 
            background: #ffffff; margin: 0; padding: 0;
            display: flex; flex-direction: column; align-items: center;
            color: #222;
        }

        #container { width: 95%; max-width: 850px; padding: 20px; box-sizing: border-box; }

        /* 설정 영역 */
        #setup-area { 
            background: #fcfcfc; border: 1px solid #efefef; 
            padding: 25px; border-radius: 15px; 
            box-shadow: 0 4px 20px rgba(0,0,0,0.05);
            margin-top: 20px;
        }
        textarea { 
            width: 100%; height: 200px; border: 1px solid #ddd; border-radius: 10px; 
            padding: 15px; font-size: 16px; line-height: 1.6; resize: none; box-sizing: border-box;
        }

        /* 읽기 영역 */
        #reader-display { 
            line-height: var(--line-height); 
            font-size: var(--font-pc); 
            word-break: keep-all; 
            min-height: 60vh; 
            padding: 40px 0;
            text-align: justify;
        }

        /* 모바일 대응 */
        @media (max-width: 768px) {
            #reader-display { font-size: var(--font-mobile); padding: 20px 0; }
            #setup-area { padding: 15px; }
            button { width: 100% !important; }
        }

        .word { display: inline-block; margin-right: 6px; color: transparent; transition: color 0.05s; }
        .word.revealed { color: #000; }

        /* 컨트롤 버튼 */
        .controls { display: flex; flex-wrap: wrap; gap: 15px; align-items: center; justify-content: center; margin-top: 20px; }
        input[type="number"] { width: 70px; padding: 8px; border-radius: 6px; border: 1px solid #ccc; text-align: center; }
        button { 
            padding: 12px 30px; font-size: 1rem; font-weight: bold;
            cursor: pointer; border: none; border-radius: 8px; 
            background: #333; color: white; transition: 0.2s;
        }
        button#start-btn { background: var(--primary-color); }
        .hidden { display: none !important; }

        /* 상단 고정 바 */
        #active-header { 
            position: sticky; top: 0; background: rgba(255,255,255,0.9); 
            width: 100%; padding: 10px; border-bottom: 1px solid #eee;
            display: flex; justify-content: flex-end; z-index: 1000;
        }
    </style>
</head>
<body>

<div id="container">
    <div id="setup-area">
        <h2 style="margin: 0 0 15px 0; text-align: center;">📖 독해 집중력 트레이너</h2>
        <textarea id="input-text">독해 훈련의 핵심은 '퇴행'을 막는 것입니다. 눈이 이미 읽은 곳으로 되돌아가는 습관만 고쳐도 속도는 두 배 이상 빨라집니다. 자신이 설정한 일정한 리듬에 맞춰 시선을 전진시키세요. 지금 바로 시작해 보세요!</textarea>
        <div class="controls">
            <div>⏱ 속도: <input type="number" id="speed" value="0.18" step="0.01"> 초</div>
            <button id="start-btn" onclick="startTraining()">연습 시작</button>
        </div>
    </div>

    <div id="active-header" class="hidden">
        <button onclick="resetTraining()" style="background: #666; font-size: 0.85rem; padding: 6px 12px;">수정하기</button>
    </div>

    <div id="reader-display"></div>
</div>

<script>
    let timer;
    let currentIndex = 0;
    let wordsArray = [];

    function startTraining() {
        const text = document.getElementById('input-text').value;
        const display = document.getElementById('reader-display');
        const setupArea = document.getElementById('setup-area');
        const activeHeader = document.getElementById('active-header');
        const speed = parseFloat(document.getElementById('speed').value) * 1000;

        if (!text.trim()) return;

        setupArea.classList.add('hidden');
        activeHeader.classList.remove('hidden');
        display.innerHTML = '';
        currentIndex = 0;

        wordsArray = text.split(/\s+/).filter(w => w.length > 0);
        wordsArray.forEach((w, i) => {
            const span = document.createElement('span');
            span.innerText = w;
            span.classList.add('word');
            span.id = `w-${i}`;
            display.appendChild(span);
        });

        clearInterval(timer);
        timer = setInterval(() => {
            if (currentIndex < wordsArray.length) {
                const currentWord = document.getElementById(`w-${currentIndex}`);
                currentWord.classList.add('revealed');
                
                // 스크롤 감도 조정 (더 부드럽게)
                if (currentIndex % 4 === 0) {
                    currentWord.scrollIntoView({ behavior: 'smooth', block: 'center' });
                }
                currentIndex++;
            } else {
                clearInterval(timer);
            }
        }, speed);
    }

    function resetTraining() {
        clearInterval(timer);
        document.getElementById('setup-area').classList.remove('hidden');
        document.getElementById('active-header').classList.add('hidden');
        document.getElementById('reader-display').innerHTML = '';
        window.scrollTo(0, 0);
    }
</script>
</body>
</html>
